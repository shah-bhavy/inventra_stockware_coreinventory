<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventra Stockware - Sign Up</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="auth-body">
    <!-- Animated background elements -->
    <div class="auth-bg">
        <div class="bg-shape shape1"></div>
        <div class="bg-shape shape2"></div>
        <div class="bg-shape shape3"></div>
    </div>

    <div class="auth-container">
        <!-- Left side - Branding -->
        <div class="auth-brand">
            <div class="brand-content">
                <div class="logo-wrapper">
                    <img src="logo.png" alt="Inventra" class="auth-logo">
                    <h1 class="brand-title">Inventra</h1>
                    <span class="brand-subtitle">STOCKWARE</span>
                </div>
                <div class="testimonial">
                    <i class="fa-solid fa-quote-right"></i>
                    <p>"The best inventory management solution we've ever used. Streamlined our entire operation."</p>
                    <div class="testimonial-author">
                        <img src="https://i.pravatar.cc/40?img=7" alt="User">
                        <div>
                            <strong>Sarah Johnson</strong>
                            <span>Operations Manager</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right side - Sign Up Form -->
        <div class="auth-card glass">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Get started with Inventra today</p>
            </div>

            <form id="signupForm" class="auth-form">
                <div class="input-row">
                    <div class="input-group">
                        <label for="firstName">
                            <i class="fa-regular fa-user"></i>
                            First Name
                        </label>
                        <input type="text" id="firstName" placeholder="John" required>
                    </div>

                    <div class="input-group">
                        <label for="lastName">
                            <i class="fa-regular fa-user"></i>
                            Last Name
                        </label>
                        <input type="text" id="lastName" placeholder="Doe" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="signupEmail">
                        <i class="fa-regular fa-envelope"></i>
                        Email Address
                    </label>
                    <input type="email" id="signupEmail" placeholder="john@company.com" required>
                </div>

                <div class="input-group">
                    <label for="company">
                        <i class="fa-regular fa-building"></i>
                        Company Name
                    </label>
                    <input type="text" id="company" placeholder="Your Company">
                </div>

                <div class="input-group">
                    <label for="signupPassword">
                        <i class="fa-regular fa-lock"></i>
                        Password
                    </label>
                    <div class="password-wrapper">
                        <input type="password" id="signupPassword" placeholder="Create password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('signupPassword')">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <small class="password-hint">At least 8 characters with 1 number and 1 special character</small>
                </div>

                <div class="input-group">
                    <label for="confirmPassword">
                        <i class="fa-regular fa-lock"></i>
                        Confirm Password
                    </label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="terms" required>
                        <span class="checkmark"></span>
                        I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" class="auth-btn btn-primary">
                    <i class="fa-regular fa-user-plus"></i>
                    Create Account
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Sign In</a></p>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
