<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventra Stockware - Login</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="auth-body">
    <!-- Animated background elements -->
    <div class="auth-bg">
        <div class="bg-shape shape1"></div>
        <div class="bg-shape shape2"></div>
        <div class="bg-shape shape3"></div>
    </div>

    <div class="auth-container">
        <!-- Left side - Branding -->
        <div class="auth-brand">
            <div class="brand-content">
                <div class="logo-wrapper">
                    <img src="logo.png" alt="Inventra" class="auth-logo">
                    <h1 class="brand-title">Inventra</h1>
                    <span class="brand-subtitle">STOCKWARE</span>
                </div>
                <div class="brand-features">
                    <div class="feature-item">
                        <i class="fa-solid fa-cubes"></i>
                        <span>Inventory Management</span>
                    </div>
                    <div class="feature-item">
                        <i class="fa-solid fa-chart-line"></i>
                        <span>Real-time Tracking</span>
                    </div>
                    <div class="feature-item">
                        <i class="fa-solid fa-shield"></i>
                        <span>Secure & Reliable</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right side - Login Form -->
        <div class="auth-card glass">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Sign in to continue to Inventra</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="input-group">
                    <label for="email">
                        <i class="fa-regular fa-envelope"></i>
                        Email Address
                    </label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label for="password">
                        <i class="fa-regular fa-lock"></i>
                        Password
                    </label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Enter your password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('password')">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="remember">
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                    <a href="reset-password.html" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="auth-btn btn-primary">
                    <i class="fa-regular fa-arrow-right-to-bracket"></i>
                    Sign In
                </button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Create Account</a></p>
            </div>

            <!-- Demo credentials hint -->
            <div class="demo-hint glass">
                <i class="fa-regular fa-circle-info"></i>
                <span>Demo: admin@inventra.com / password123</span>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
