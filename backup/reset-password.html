<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventra Stockware - Reset Password</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="auth-body">
    <!-- Animated background elements -->
    <div class="auth-bg">
        <div class="bg-shape shape1"></div>
        <div class="bg-shape shape2"></div>
        <div class="bg-shape shape3"></div>
    </div>

    <div class="auth-container">
        <!-- Left side - Branding -->
        <div class="auth-brand">
            <div class="brand-content">
                <div class="logo-wrapper">
                    <img src="logo.png" alt="Inventra" class="auth-logo">
                    <h1 class="brand-title">Inventra</h1>
                    <span class="brand-subtitle">STOCKWARE</span>
                </div>
                <div class="security-badge">
                    <i class="fa-solid fa-shield-halved"></i>
                    <div>
                        <h4>Secure Password Reset</h4>
                        <p>Your security is our priority</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right side - Reset Password Form -->
        <div class="auth-card glass">
            <div class="auth-header">
                <h2>Reset Password</h2>
                <p>Enter your email to receive reset instructions</p>
            </div>

            <!-- Step 1: Email Form -->
            <div id="step1" class="auth-form">
                <div class="input-group">
                    <label for="resetEmail">
                        <i class="fa-regular fa-envelope"></i>
                        Email Address
                    </label>
                    <input type="email" id="resetEmail" placeholder="Enter your email" required>
                </div>

                <button type="button" class="auth-btn btn-primary" onclick="sendResetCode()">
                    <i class="fa-regular fa-paper-plane"></i>
                    Send Reset Code
                </button>

                <div class="auth-footer">
                    <p><a href="login.html"><i class="fa-regular fa-arrow-left"></i> Back to Login</a></p>
                </div>
            </div>

            <!-- Step 2: Verification Code (hidden initially) -->
            <div id="step2" class="auth-form" style="display: none;">
                <div class="input-group">
                    <label for="resetCode">
                        <i class="fa-regular fa-key"></i>
                        Verification Code
                    </label>
                    <div class="code-inputs">
                        <input type="text" maxlength="1" class="code-digit" onkeyup="moveToNext(this, 1)">
                        <input type="text" maxlength="1" class="code-digit" onkeyup="moveToNext(this, 2)">
                        <input type="text" maxlength="1" class="code-digit" onkeyup="moveToNext(this, 3)">
                        <input type="text" maxlength="1" class="code-digit" onkeyup="moveToNext(this, 4)">
                        <input type="text" maxlength="1" class="code-digit" onkeyup="moveToNext(this, 5)">
                        <input type="text" maxlength="1" class="code-digit" onkeyup="moveToNext(this, 6)">
                    </div>
                </div>

                <button type="button" class="auth-btn btn-primary" onclick="verifyCode()">
                    <i class="fa-regular fa-circle-check"></i>
                    Verify Code
                </button>

                <div class="timer-text">
                    <i class="fa-regular fa-clock"></i>
                    <span id="timer">02:00</span>
                </div>

                <button type="button" class="resend-btn" onclick="resendCode()">
                    Resend Code
                </button>
            </div>

            <!-- Step 3: New Password (hidden initially) -->
            <div id="step3" class="auth-form" style="display: none;">
                <div class="input-group">
                    <label for="newPassword">
                        <i class="fa-regular fa-lock"></i>
                        New Password
                    </label>
                    <div class="password-wrapper">
                        <input type="password" id="newPassword" placeholder="Enter new password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('newPassword')">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="input-group">
                    <label for="confirmNewPassword">
                        <i class="fa-regular fa-lock"></i>
                        Confirm Password
                    </label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmNewPassword" placeholder="Confirm new password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('confirmNewPassword')">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="password-requirements">
                    <p>Password must contain:</p>
                    <ul>
                        <li id="req-length"><i class="fa-regular fa-circle-xmark"></i> At least 8 characters</li>
                        <li id="req-number"><i class="fa-regular fa-circle-xmark"></i> At least 1 number</li>
                        <li id="req-special"><i class="fa-regular fa-circle-xmark"></i> At least 1 special character</li>
                        <li id="req-match"><i class="fa-regular fa-circle-xmark"></i> Passwords match</li>
                    </ul>
                </div>

                <button type="button" class="auth-btn btn-primary" onclick="updatePassword()">
                    <i class="fa-regular fa-check"></i>
                    Update Password
                </button>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
