<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventra Stockware - Receipts</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <img src="logo.png" alt="Inventra">
            <span class="logo-text">Inventra</span>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" data-tooltip="Dashboard">
                <i class="fa-solid fa-chart-line"></i>
            </a>
            <a href="receipts.html" class="active" data-tooltip="Receipts">
                <i class="fa-solid fa-box"></i>
            </a>
            <a href="delivery.html" data-tooltip="Deliveries">
                <i class="fa-solid fa-truck"></i>
            </a>
            <a href="move-history.html" data-tooltip="Move History">
                <i class="fa-solid fa-clock-rotate-left"></i>
            </a>
        </nav>
    </div>

    <div class="main">
        <header class="header glass">
            <div class="header-left">
                <h2>Receipts</h2>
                <p class="page-subtitle">Manage incoming inventory</p>
            </div>
            <div class="actions">
                <button class="btn btn-primary">
                    <i class="fa-regular fa-plus"></i> New Receipt
                </button>
                <button class="btn btn-secondary">
                    <i class="fa-regular fa-file-pdf"></i> Export
                </button>
            </div>
        </header>

        <!-- Search and Filter Bar -->
        <div class="search-bar glass">
            <div class="search-wrapper">
                <i class="fa-regular fa-search"></i>
                <input id="searchInput" type="text" placeholder="Search receipts by reference, contact...">
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active">All</button>
                <button class="filter-btn">Today</button>
                <button class="filter-btn">This Week</button>
                <button class="filter-btn">This Month</button>
            </div>
        </div>

        <!-- Summary Cards -->
        <div class="stats mini-stats">
            <div class="stat-card glass">
                <div class="stat-content">
                    <h3>24</h3>
                    <p>Total Receipts</p>
                </div>
            </div>
            <div class="stat-card glass">
                <div class="stat-content">
                    <h3>8</h3>
                    <p>Pending</p>
                </div>
            </div>
            <div class="stat-card glass">
                <div class="stat-content">
                    <h3>16</h3>
                    <p>Completed</p>
                </div>
            </div>
        </div>

        <!-- Receipts Table -->
        <div class="table-card glass">
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Reference</th>
                            <th>From</th>
                            <th>To</th>
                            <th>Contact</th>
                            <th>Schedule Date</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><span class="ref-badge">WH/IN/001</span></td>
                            <td>Vendor A</td>
                            <td>WH/Stock1</td>
                            <td>Azure Interior</td>
                            <td>03/15/2026</td>
                            <td><span class="status ready">Ready</span></td>
                            <td>
                                <button class="btn-icon"><i class="fa-regular fa-eye"></i></button>
                                <button class="btn-icon"><i class="fa-regular fa-print"></i></button>
                            </td>
                        </tr>
                        <tr>
                            <td><span class="ref-badge">WH/IN/002</span></td>
                            <td>Vendor B</td>
                            <td>WH/Stock2</td>
                            <td>Azure Interior</td>
                            <td>03/16/2026</td>
                            <td><span class="status processing">Processing</span></td>
                            <td>
                                <button class="btn-icon"><i class="fa-regular fa-eye"></i></button>
                                <button class="btn-icon"><i class="fa-regular fa-print"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
